name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: semantic-release
  cancel-in-progress: false

jobs:
  release:
    name: Semantic Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Node.jsを設定
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm

      - name: 依存関係を復元
        run: npm ci

      - name: リリース更新処理を検証
        run: npm run test:release

      - name: リリースを判定・公開
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run release
